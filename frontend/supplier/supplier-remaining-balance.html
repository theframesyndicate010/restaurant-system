<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Remaining Balance - Smart Cafeteria</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/supplier-remaining-balance.css">
</head>

<body class="supplier-remaining-balance-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Supplier Remaining Balance</h4>
                        <p class="page-header-subtitle">Track due balances and proceed with supplier payment actions quickly.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card supplier-balance-filter-card">
                    <div class="card-body">
                        <div class="supplier-balance-toolbar-row">
                            <select id="supplierBalanceFilter" class="form-select filter-dropdown supplier-balance-filter" aria-label="Select supplier">
                                <option value="">-- Select Supplier --</option>
                            </select>

                            <div class="supplier-balance-toolbar-right">
                                <select id="supplierBalancePageLength" class="form-select filter-dropdown supplier-balance-page-length" aria-label="Page length">
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50" selected>50</option>
                                    <option value="100">100</option>
                                </select>

                                <button type="button" id="supplierBalanceRefreshBtn" class="btn supplier-balance-refresh-btn" title="Refresh">
                                    <i class="fa-solid fa-rotate-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box supplier-balance-table-shell">
                            <table class="table align-middle mb-0 table-hover supplier-balance-table datatable-init">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Supplier</th>
                                        <th>Amount</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="supplierBalanceTableBody"></tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="2" class="supplier-balance-total-label">Total Amount</td>
                                        <td class="supplier-balance-total-value" id="supplierBalanceTotalValue">0.00</td>
                                        <td></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <template id="supplierBalanceCellSnTemplate">
                            <span class="supplier-balance-sn">0</span>
                        </template>

                        <template id="supplierBalanceCellSupplierTemplate">
                            <span class="supplier-balance-name"></span>
                        </template>

                        <template id="supplierBalanceCellAmountTemplate">
                            <div class="supplier-balance-amount-wrap">
                                <span class="supplier-balance-due-badge">Due</span>
                                <span class="supplier-balance-amount">0.00</span>
                            </div>
                        </template>

                        <template id="supplierBalanceCellActionTemplate">
                            <div class="d-flex justify-content-center">
                                <button type="button" class="btn supplier-balance-pay-btn">
                                    <i class="fa-solid fa-money-check-dollar"></i>
                                    <span>Pay</span>
                                </button>
                            </div>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/supplier-remaining-balance.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
