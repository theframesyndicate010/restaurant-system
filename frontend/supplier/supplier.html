<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier - Smart Cafeteria</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/supplier.css">
</head>

<body class="supplier-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Supplier</h4>
                        <p class="page-header-subtitle">Manage supplier records, contact details, and account status in one place.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card supplier-filter-card">
                    <div class="card-body">
                        <div class="supplier-toolbar-row">
                            <button type="button" id="addSupplierBtn" class="btn supplier-add-btn">
                                <i class="fa-solid fa-plus"></i>
                                <span>Add Supplier</span>
                            </button>

                            <input
                                id="supplierSearch"
                                type="search"
                                class="form-control filter-search-input supplier-search"
                                placeholder="Supplier Name"
                                aria-label="Search supplier"
                            >

                            <select id="supplierPageLength" class="form-select filter-dropdown supplier-page-length" aria-label="Page length">
                                <option value="10">10</option>
                                <option value="25">25</option>
                                <option value="50" selected>50</option>
                                <option value="100">100</option>
                            </select>

                            <button type="button" id="supplierRefreshBtn" class="btn supplier-refresh-btn" title="Refresh">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box supplier-table-shell">
                            <table class="table align-middle mb-0 table-hover supplier-table datatable-init">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Supplier Name</th>
                                        <th>Permanent Address</th>
                                        <th>Contact No</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="supplierTableBody"></tbody>
                            </table>
                        </div>

                        <template id="supplierCellSnTemplate">
                            <span class="supplier-sn">0</span>
                        </template>

                        <template id="supplierCellNameTemplate">
                            <span class="supplier-name"></span>
                        </template>

                        <template id="supplierCellAddressTemplate">
                            <span class="supplier-address"></span>
                        </template>

                        <template id="supplierCellContactTemplate">
                            <span class="supplier-contact"></span>
                        </template>

                        <template id="supplierCellStatusTemplate">
                            <span class="supplier-status-badge">Enabled</span>
                        </template>

                        <template id="supplierCellActionsTemplate">
                            <div class="d-flex justify-content-center supplier-action-wrap">
                                <button type="button" class="action-btn action-btn-view supplier-view-btn" title="View">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                                <button type="button" class="action-btn action-btn-edit supplier-edit-btn" title="Edit">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button type="button" class="action-btn action-btn-delete supplier-delete-btn" title="Delete">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                                <button type="button" class="action-btn supplier-toggle-btn" title="Toggle Status">
                                    <i class="fa-regular fa-thumbs-down"></i>
                                </button>
                            </div>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/supplier.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
