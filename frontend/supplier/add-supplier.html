<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Supplier - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="../shared/styles/base/floaty.css">
    <link rel="stylesheet" href="styles/add-supplier.css">
</head>

<body class="add-supplier-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Add Supplier</h4>
                            <p class="page-header-subtitle">Enter supplier profile, contact, and tax details for future purchases.</p>
                        </div>
                        <a href="supplier.html" class="btn btn-outline-light add-supplier-back-btn text-decoration-none d-inline-flex align-items-center gap-2">
                            <i class="fa-solid fa-arrow-left"></i>
                            Back to Supplier List
                        </a>
                    </div>
                </div>

                <div class="card content-card add-supplier-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="add-supplier-head d-flex align-items-center border-bottom pb-4 mb-4">
                            <div class="add-supplier-head-icon">
                                <i class="fa-solid fa-people-group"></i>
                            </div>
                            <div>
                                <h5 class="fw-bold text-dark mb-1">New Supplier</h5>
                                <p class="text-muted small mb-0">Fill the required supplier information to continue.</p>
                            </div>
                        </div>

                        <div id="addSupplierAlert" class="alert d-none mb-4" role="alert"></div>

                        <form id="addSupplierForm" novalidate>
                            <div class="row g-4 pt-1">
                                <div class="col-md-6">
                                    <div class="floaty-input">
                                        <input id="supplierFullName" type="text" class="form-control form-control-solid" placeholder=" " required>
                                        <label class="text-dark">
                                            <i class="fa-solid fa-id-card me-1 text-primary"></i> Full Name <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="floaty-input">
                                        <input id="supplierPermanentAddress" type="text" class="form-control form-control-solid" placeholder=" " required>
                                        <label class="text-dark">
                                            <i class="fa-solid fa-location-dot me-1 text-primary"></i> Permanent Address <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="floaty-input">
                                        <input id="supplierPrimaryContact" type="tel" class="form-control form-control-solid" placeholder=" " required>
                                        <label class="text-dark">
                                            <i class="fa-solid fa-phone me-1 text-primary"></i> Primary Contact <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="floaty-input">
                                        <input id="supplierEmail" type="email" class="form-control form-control-solid" placeholder=" ">
                                        <label class="text-dark">
                                            <i class="fa-solid fa-envelope me-1 text-primary"></i> Email
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="floaty-input">
                                        <input id="supplierTemporaryAddress" type="text" class="form-control form-control-solid" placeholder=" ">
                                        <label class="text-dark">
                                            <i class="fa-solid fa-map-location-dot me-1 text-primary"></i> Temporary Address
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="floaty-input">
                                        <input id="supplierSecondaryContact" type="tel" class="form-control form-control-solid" placeholder=" ">
                                        <label class="text-dark">
                                            <i class="fa-solid fa-phone-volume me-1 text-primary"></i> Secondary Contact
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="floaty-input">
                                        <input id="supplierPanNo" type="text" class="form-control form-control-solid" placeholder=" ">
                                        <label class="text-dark">
                                            <i class="fa-solid fa-address-card me-1 text-primary"></i> Pan No
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="floaty-input">
                                        <textarea id="supplierDescription" class="form-control form-control-solid" placeholder=" " rows="4"></textarea>
                                        <label class="text-dark">
                                            <i class="fa-solid fa-pen-to-square me-1 text-primary"></i> Description
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="alert add-supplier-note mt-4 mb-0">
                                <i class="fa-solid fa-circle-info me-2"></i>
                                <strong>Note:</strong> * Fields are mandatory.
                            </div>

                            <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top add-supplier-actions">
                                <a href="supplier.html" class="btn btn-outline-secondary px-4 d-inline-flex align-items-center gap-2 text-decoration-none">
                                    <i class="fa-solid fa-arrow-left"></i> Back
                                </a>
                                <button type="reset" id="addSupplierResetBtn" class="btn btn-outline-secondary px-4 d-inline-flex align-items-center gap-2">
                                    <i class="fa-solid fa-rotate-right"></i> Reset
                                </button>
                                <button type="submit" class="btn add-supplier-save-btn px-4 d-inline-flex align-items-center gap-2">
                                    <i class="fa-solid fa-floppy-disk"></i> Save Supplier
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="scripts/add_supplier.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
