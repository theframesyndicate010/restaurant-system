<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Summary Report - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/supplier-summary-report.css">
</head>

<body class="supplier-summary-report-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Supplier Summary Report</h4>
                        <p class="page-header-subtitle">View supplier-wise billing, paid amount, discount, and due summary.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card supplier-summary-filter-card">
                    <div class="card-body">
                        <div class="supplier-summary-toolbar-row">
                            <div class="supplier-summary-field">
                                <label for="supplierSummarySupplier" class="form-label supplier-summary-label">Search Supplier</label>
                                <select id="supplierSummarySupplier" class="form-select filter-dropdown supplier-summary-control" aria-label="Search supplier">
                                    <option value="">-- Select Supplier --</option>
                                </select>
                            </div>

                            <div class="supplier-summary-field">
                                <label for="supplierSummaryFromDate" class="form-label supplier-summary-label">From Date</label>
                                <input id="supplierSummaryFromDate" type="date" class="form-control filter-search-input supplier-summary-control" value="2082-12-30" aria-label="From date">
                            </div>

                            <div class="supplier-summary-field">
                                <label for="supplierSummaryToDate" class="form-label supplier-summary-label">To Date</label>
                                <input id="supplierSummaryToDate" type="date" class="form-control filter-search-input supplier-summary-control" value="2082-12-30" aria-label="To date">
                            </div>

                            <div class="supplier-summary-field">
                                <label for="supplierSummaryRows" class="form-label supplier-summary-label">Rows</label>
                                <select id="supplierSummaryRows" class="form-select filter-dropdown supplier-summary-control supplier-summary-rows" aria-label="Rows per page">
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50" selected>50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>

                            <div class="supplier-summary-field supplier-summary-search-wrap">
                                <label class="form-label supplier-summary-label visually-hidden" for="supplierSummarySearchBtn">Search</label>
                                <button id="supplierSummarySearchBtn" type="button" class="btn filter-search-btn supplier-summary-search-btn" aria-label="Search report">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card supplier-summary-content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box supplier-summary-table-shell">
                            <table class="table align-middle mb-0 table-hover supplier-summary-table datatable-init" id="supplierSummaryTable">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Supplier Name</th>
                                        <th>Contact</th>
                                        <th class="text-end">Total Bill Amt</th>
                                        <th class="text-end">Total Discount</th>
                                        <th class="text-end">Total Paid</th>
                                        <th class="text-end">Total Due</th>
                                    </tr>
                                </thead>
                                <tbody id="supplierSummaryTableBody">
                                    <tr data-supplier="Birtamode Liquor" data-date="2082-12-30">
                                        <td>
                                            <button type="button" class="supplier-summary-expand" aria-label="Open supplier details">
                                                <i class="fa-solid fa-plus"></i>
                                            </button>
                                        </td>
                                        <td>
                                            <a href="supplier-payment-history.html?supplier=Birtamode%20Liquor" class="supplier-summary-name">Birtamode Liquor</a>
                                        </td>
                                        <td>1234569078</td>
                                        <td class="text-end">0.00</td>
                                        <td class="text-end">0.00</td>
                                        <td class="text-end">0.00</td>
                                        <td class="text-end text-muted">-</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/supplier-summary-report.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
