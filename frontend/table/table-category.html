<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Category - Smart Cafeteria</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css?v=20260411-4">
    <link rel="stylesheet" href="styles/tables.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <!-- Mobile Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <!-- Sidebar Component -->
        <app-sidebar></app-sidebar>

        <!-- Main Content -->
        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <!-- Top Header Component -->
            <app-header></app-header>

            <!-- Page Content -->
            <div class="container-fluid p-3 p-md-4 overflow-auto">

                <!-- Page Header Card -->
                <div class="card page-header-card">
                    <div
                        class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Table Categories</h4>
                            <p class="page-header-subtitle">Manage categorization areas for restaurant seating.</p>
                        </div>
                        <div>
                            <a href="add-table-category.html" class="btn page-header-btn text-decoration-none">
                                <i class="fa-solid fa-plus pt-1 d-inline-block"></i> Add New Category
                            </a>
                        </div>
                    </div>
                </div>



                <!-- Main Content Card -->
                <div class="card content-card">
                    <div class="card-body">
                        <!-- Data Table -->
                        <div class="table-responsive premium-table-box">
                            <table class="table align-middle mb-0 text-nowrap table-hover datatable-init">
                                <thead>
                                    <tr>
                                        <th style="width: 60px;">#</th>
                                        <th>Name</th>
                                        <th>Code</th>
                                        <th>Status</th>
                                        <th style="width: 120px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Row 1 -->
                                    <tr>
                                        <td><span
                                                class="badge bg-light text-dark fw-bold border">1</span></td>
                                        <td class="fw-medium text-dark">VIP Lounge</td>
                                        <td class="text-muted">VIP</td>
                                        <td>
                                            <span
                                                class="badge bg-success bg-opacity-10 text-success border border-success-subtle px-3">Active</span>
                                        </td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-success shadow-sm" title="View"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="btn btn-sm btn-outline-primary shadow-sm" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm"
                                                    title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <!-- Row 2 -->
                                    <tr>
                                        <td><span
                                                class="badge bg-light text-dark fw-bold border">2</span></td>
                                        <td class="fw-medium text-dark">Main Dining</td>
                                        <td class="text-muted">MAIN</td>
                                        <td>
                                            <span
                                                class="badge bg-success bg-opacity-10 text-success border border-success-subtle px-3">Active</span>
                                        </td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-success shadow-sm" title="View"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="btn btn-sm btn-outline-primary shadow-sm" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm"
                                                    title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <!-- Row 3 -->
                                    <tr>
                                        <td><span
                                                class="badge bg-light text-dark fw-bold border">3</span></td>
                                        <td class="fw-medium text-dark">Rooftop / Terrace</td>
                                        <td class="text-muted">TERR</td>
                                        <td>
                                            <span
                                                class="badge bg-warning bg-opacity-10 text-warning border border-warning-subtle px-3">Inactive</span>
                                        </td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-success shadow-sm" title="View"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="btn btn-sm btn-outline-primary shadow-sm" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm"
                                                    title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <app-datatable></app-datatable>

                    </div>
                </div>
            </div>

            <!-- jQuery (required by DataTables) -->
            <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
            <!-- DataTables JS + Extensions -->
            <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
            <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
            <!-- Bootstrap JS -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
            <!-- Component Scripts -->
            <script src="../shared/components/component.js"></script>
            <script src="../shared/components/data_table.js?v=20260411-4"></script>
            <!-- Custom Scripts -->
            <script src="../shared/scripts/script.js"></script>
</body>

</html>
