<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Tables - Smart Cafeteria</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="styles/datatable.css">
    <link rel="stylesheet" href="styles/tables.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <!-- Mobile Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <!-- Sidebar Component -->
        <app-sidebar></app-sidebar>

        <!-- Main Content -->
        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <!-- Top Header Component -->
            <app-header></app-header>

            <!-- Page Content -->
            <div class="container-fluid p-3 p-md-4 overflow-auto">

                <!-- Page Header Card -->
                <div class="card page-header-card">
                    <div
                        class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Create Tables</h4>
                            <p class="page-header-subtitle">Manage individual table seating arrangements and capacities.
                            </p>
                        </div>
                        <div>
                            <a href="add-table.html" class="btn page-header-btn text-decoration-none">
                                <i class="fa-solid fa-plus pt-1 d-inline-block"></i> Add New Table
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Filter Toolbar -->
                <div class="card filter-toolbar-card create-tables-toolbar-card mb-4"
                    style="border: 1px solid #f1f5f9; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); background-color: #ffffff;">
                    <div class="card-body p-3 p-md-4">
                        <div class="d-flex flex-column flex-lg-row gap-3 align-items-stretch align-items-lg-center">
                            <div>
                                <button class="btn text-white fw-medium shadow-sm create-tables-auto-btn"
                                    style="background-color: var(--primary-blue); border-color: var(--primary-blue); padding: 0.5rem 1.2rem; font-size: 0.9rem; border-radius: 6px;">
                                    Auto Positions
                                </button>
                            </div>

                            <div class="d-flex flex-wrap align-items-center gap-2 ms-lg-auto create-tables-controls">
                                <input type="search" id="createTablesSearch"
                                    class="form-control filter-search-input create-tables-search"
                                    placeholder="Search table" aria-label="Search tables">

                                <select id="createTablesPageLength"
                                    class="form-select filter-dropdown create-tables-length"
                                    aria-label="Rows per page">
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50" selected>50</option>
                                    <option value="100">100</option>
                                </select>

                                <button type="button" id="createTablesRefresh" class="btn create-tables-refresh-btn"
                                    title="Refresh">
                                    <i class="fa-solid fa-rotate-right"></i>
                                </button>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- Main Content Card -->
                <div class="card content-card"
                    style="border: 1px solid #f1f5f9; border-top: 3px solid var(--primary-blue); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); background-color: #ffffff;">
                    <div class="card-body p-4">

                        <!-- Table Top Toolbar -->

                        <!-- Data Table -->
                        <div class="table-responsive premium-table-box">
                            <table class="table align-middle mb-0 text-nowrap table-hover datatable-init create-tables-table">
                                <thead>
                                    <tr>
                                        <th style="width: 60px;">#</th>
                                        <th>Name</th>
                                        <th>Display Name</th>
                                        <th>Table Category</th>
                                        <th>Display Position</th>
                                        <th>Status</th>
                                        <th>Is Reserved</th>
                                        <th style="width: 120px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Row 1 -->
                                    <tr>
                                        <td><span
                                                class="badge bg-light text-dark fw-bold border">1</span></td>
                                        <td class="fw-bold text-primary">Table 1</td>
                                        <td class="fw-medium text-dark">T1</td>
                                        <td class="text-muted">Main Dining</td>
                                        <td><span class="badge bg-light text-dark border">1</span>
                                        </td>
                                        <td>
                                            <span
                                                class="badge bg-success bg-opacity-10 text-success border border-success-subtle px-3">Active</span>
                                        </td>
                                        <td>
                                            <span
                                                class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary-subtle px-3">No</span>
                                        </td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-primary shadow-sm" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm"
                                                    title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <!-- Row 2 -->
                                    <tr>
                                        <td><span
                                                class="badge bg-light text-dark fw-bold border">2</span></td>
                                        <td class="fw-bold text-primary">Table 2</td>
                                        <td class="fw-medium text-dark">T2</td>
                                        <td class="text-muted">Main Dining</td>
                                        <td><span class="badge bg-light text-dark border">2</span>
                                        </td>
                                        <td>
                                            <span
                                                class="badge bg-success bg-opacity-10 text-success border border-success-subtle px-3">Active</span>
                                        </td>
                                        <td>
                                            <span
                                                class="badge bg-danger bg-opacity-10 text-danger border border-danger-subtle px-3">Yes</span>
                                        </td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-primary shadow-sm" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm"
                                                    title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <!-- Row 3 -->
                                    <tr>
                                        <td><span
                                                class="badge bg-light text-dark fw-bold border">3</span></td>
                                        <td class="fw-bold text-primary">VIP-1</td>
                                        <td class="fw-medium text-dark">V1</td>
                                        <td class="text-muted">VIP Lounge</td>
                                        <td><span class="badge bg-light text-dark border">1</span>
                                        </td>
                                        <td>
                                            <span
                                                class="badge bg-warning bg-opacity-10 text-warning border border-warning-subtle px-3">Maintenance</span>
                                        </td>
                                        <td>
                                            <span
                                                class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary-subtle px-3">No</span>
                                        </td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-primary shadow-sm" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm"
                                                    title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <app-datatable></app-datatable>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- jQuery (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS + Extensions -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component Scripts -->
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <!-- Custom Scripts -->
    <script src="scripts/create-tables.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
