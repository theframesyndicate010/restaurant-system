<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Payment History - Smart Cafeteria</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="styles/customer-pay-history.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/customer-pay-history.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <!-- Mobile Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <!-- Sidebar Component -->
        <app-sidebar></app-sidebar>

        <!-- Main Content -->
        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <!-- Top Header Component -->
            <app-header></app-header>

            <!-- Customer Payment History Content -->
            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <!-- Page Header Card -->
                <div class="card page-header-card">
                    <div
                        class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Customer Payment History</h4>
                            <p class="page-header-subtitle">Track and manage all customer payment records.</p>
                        </div>
                    </div>
                </div>

                <!-- Filter Toolbar -->
                <div class="card filter-toolbar-card">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <!-- Customer filter -->
                            <div class="col-12 col-md-3">
                                <label class="form-label">Customer</label>
                                <select class="form-select filter-dropdown">
                                    <option>--Select Customer--</option>
                                    <option value="1">Naya Sahakari</option>
                                </select>
                            </div>

                            <!-- From Date filter -->
                            <div class="col-12 col-md-3">
                                <label class="form-label">From Date</label>
                                <input type="text" class="form-control filter-search-input" placeholder="YYYY/MM/DD">
                            </div>

                            <!-- To Date filter -->
                            <div class="col-12 col-md-3">
                                <label class="form-label">To Date</label>
                                <input type="text" class="form-control filter-search-input" placeholder="YYYY/MM/DD">
                            </div>

                            <!-- Payment Type filter -->
                            <div class="col-12 col-md-3">
                                <label class="form-label">Payment Type</label>
                                <select class="form-select filter-dropdown">
                                    <option>--All--</option>
                                    <option value="cash">Cash</option>
                                    <option value="card">Card</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Content Card -->
                <div class="card content-card">
                    <div class="card-body">
                        <!-- Data Table -->
                        <div class="table-responsive premium-table-box">
                            <table class="table align-middle mb-0 text-nowrap table-hover datatable-init">
                                <thead>
                                    <tr>
                                        <th style="width: 60px;">SN</th>
                                        <th>Date</th>
                                        <th>Customer</th>
                                        <th>Paid Amount</th>
                                        <th>Discount Amount</th>
                                        <th>Payment Mode</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                                <tfoot>
                                    <!-- Total Row -->
                                    <tr style="background-color: #f8fafc;">
                                        <td colspan="3" class="text-end text-dark fw-bold border-end-0">Net Total</td>
                                        <td class="text-dark fw-bold border-start-0 border-end-0" style="font-size: 1.05rem;">0</td>
                                        <td class="border-start-0 border-end-0"></td>
                                        <td class="border-start-0"></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS + Extensions -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component Scripts -->
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
