<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Payment - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="../shared/styles/base/floaty.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/customer.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="row">
                    <div class="">
                        <div class="card content-card"
                            style="border: 1px solid #f1f5f9; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); background-color: #ffffff;">
                            <div class="card-body p-4 p-md-5">
                                <div class="d-flex align-items-center mb-4 border-bottom pb-4"
                                    style="border-color: #f1f5f9 !important;">
                                    <div class="d-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded text-primary me-3"
                                        style="width: 48px; height: 48px;">
                                        <i class="fa-solid fa-money-check-dollar fs-5"></i>
                                    </div>
                                    <div>
                                        <h5 class="fw-bold text-dark mb-1" style="font-size: 1.15rem;">Customer Payment
                                        </h5>
                                        <p class="text-muted small mb-0">Record customer due payment and track bill
                                            settlement</p>
                                    </div>
                                </div>

                                <form id="customerPaymentForm">
                                    <div class="row g-4 pt-2">
                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <select id="customerName" class="form-control form-control-solid"
                                                    required>
                                                    <option value="" selected disabled></option>
                                                    <option>Naya Sahakari</option>
                                                    <option>Hari Bahadur</option>
                                                    <option>Sushma Ghale</option>
                                                </select>
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-user me-1 text-primary"></i> Customer Name
                                                    <span class="text-danger">*</span>
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <input id="discountAmount" type="number"
                                                    class="form-control form-control-solid" placeholder="0" min="0"
                                                    step="0.01">
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-percent me-1 text-primary"></i> Discount
                                                    Amount
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <input id="paidAmount" type="number"
                                                    class="form-control form-control-solid" placeholder="0" min="0"
                                                    step="0.01" required>
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-money-bill-wave me-1 text-primary"></i> Paid
                                                    Amount <span class="text-danger">*</span>
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <select id="paymentType" class="form-control form-control-solid"
                                                    required>
                                                    <option value="" selected disabled></option>
                                                    <option>Cash</option>
                                                    <option>Card</option>
                                                    <option>Bank Transfer</option>
                                                    <option>Wallet</option>
                                                </select>
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-credit-card me-1 text-primary"></i> Payment
                                                    Type <span class="text-danger">*</span>
                                                </label>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <div class="table-responsive premium-table-box border rounded-3"
                                                style="border-color: #e2e8f0 !important;">
                                                <table id="customerPaymentTable"
                                                    class="table align-middle mb-0 text-nowrap table-hover datatable-init">
                                                    <thead>
                                                        <tr>
                                                            <th style="width: 70px;">S.N</th>
                                                            <th>Bill Date</th>
                                                            <th>Bill No</th>
                                                            <th class="text-end">Bill Amt.</th>
                                                            <th class="text-end">Paid Amt.</th>
                                                            <th class="text-end">Due Amt.</th>
                                                            <th>View Bill</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody id="billRows"></tbody>
                                                </table>
                                            </div>
                                            <app-datatable></app-datatable>
                                        </div>

                                        <div class="col-12">
                                            <div class="d-flex justify-content-end">
                                                <div class="fw-semibold text-dark">Total Due: <span id="totalDueValue"
                                                        class="text-danger">0.00</span></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="alert mt-4 mb-0"
                                        style="background-color: #fff8f1; border: 1px solid #ffe8cc; color: #d97706; border-radius: 8px; font-size: 0.85rem;">
                                        <i class="fa-solid fa-circle-info me-2"></i> <strong
                                            class="fw-bold">Note:</strong> * Fields are mandatory.
                                    </div>

                                    <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top"
                                        style="border-color: #f1f5f9 !important;">
                                        <a href="customer-due.html"
                                            class="btn px-4 bg-white text-dark border d-flex align-items-center gap-2 text-decoration-none"
                                            style="border-color: #e2e8f0 !important; border-radius: 6px; font-weight: 600; font-size: 0.85rem;">
                                            <i class="fa-solid fa-arrow-left"></i> Back
                                        </a>
                                        <button id="resetPaymentForm" type="reset"
                                            class="btn px-4 bg-white text-dark border d-flex align-items-center gap-2"
                                            style="border-color: #e2e8f0 !important; border-radius: 6px; font-weight: 600; font-size: 0.85rem;">
                                            <i class="fa-solid fa-rotate-right"></i> Reset
                                        </button>
                                        <button type="submit"
                                            class="btn px-4 d-flex align-items-center gap-2 text-white"
                                            style="background-color: #1a56db; border-radius: 6px; font-weight: 600; font-size: 0.85rem; border: none;">
                                            <i class="fa-solid fa-paper-plane"></i> Save Payment
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS + Extensions -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component Scripts -->
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="../shared/scripts/script.js"></script>
    <script>
        const customerBills = {
            "Naya Sahakari": [
                { billDate: "2026-04-08", billNo: "#INV-1012", billAmt: 2200, paidAmt: 700, dueAmt: 1500 }
            ],
            "Hari Bahadur": [
                { billDate: "2026-04-05", billNo: "#INV-1007", billAmt: 1800, paidAmt: 300, dueAmt: 1500 },
                { billDate: "2026-04-07", billNo: "#INV-1010", billAmt: 1250, paidAmt: 250, dueAmt: 1000 }
            ],
            "Sushma Ghale": [
                { billDate: "2026-04-03", billNo: "#INV-0999", billAmt: 980, paidAmt: 400, dueAmt: 580 }
            ]
        };

        const customerName = document.getElementById("customerName");
        const discountAmount = document.getElementById("discountAmount");
        const paidAmount = document.getElementById("paidAmount");
        const billRows = document.getElementById("billRows");
        const totalDueValue = document.getElementById("totalDueValue");
        const paymentForm = document.getElementById("customerPaymentForm");
        const resetPaymentForm = document.getElementById("resetPaymentForm");

        const numberFormat = (value) => Number(value).toFixed(2);

        const getCurrentBills = () => {
            if (!customerName || !customerName.value) {
                return [];
            }
            return customerBills[customerName.value] || [];
        };

        let dtInstance = null;

        const getBaseDueTotal = () => {
            return getCurrentBills().reduce((sum, row) => sum + row.dueAmt, 0);
        };

        const renderBills = () => {
            const rows = getCurrentBills();
            if (!customerPaymentForm) return;

            // Wait until DataTable is initialized (via data_table.js or manually)
            if (!$.fn.DataTable.isDataTable('#customerPaymentTable')) {
                // If not yet ready, we'll try again shortly or let data_table.js handle it
                return;
            }

            const table = $('#customerPaymentTable').DataTable();
            table.clear();

            if (rows.length > 0) {
                rows.forEach((row, index) => {
                    table.row.add([
                        `<span class="sn-badge">${index + 1}</span>`,
                        row.billDate,
                        row.billNo,
                        numberFormat(row.billAmt),
                        numberFormat(row.paidAmt),
                        `<span class="fw-semibold text-danger">${numberFormat(row.dueAmt)}</span>`,
                        `<button type="button" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-eye"></i></button>`
                    ]);
                });
            }

            table.draw();
        };

        const updateTotalDue = () => {
            const baseDue = getBaseDueTotal();
            const discount = parseFloat(discountAmount?.value || "0") || 0;
            const paid = parseFloat(paidAmount?.value || "0") || 0;
            const adjustedDue = Math.max(baseDue - discount - paid, 0);

            if (paidAmount) {
                const maxAllowedPaid = Math.max(baseDue - discount, 0);
                if (paid > maxAllowedPaid) {
                    paidAmount.setCustomValidity("Paid amount cannot exceed due amount after discount.");
                } else {
                    paidAmount.setCustomValidity("");
                }
            }

            if (totalDueValue) {
                totalDueValue.textContent = numberFormat(adjustedDue);
            }
        };

        customerName?.addEventListener("change", () => {
            renderBills();
            updateTotalDue();
        });

        discountAmount?.addEventListener("input", updateTotalDue);
        paidAmount?.addEventListener("input", updateTotalDue);

        resetPaymentForm?.addEventListener("click", () => {
            setTimeout(() => {
                renderBills();
                updateTotalDue();
            }, 0);
        });

        paymentForm?.addEventListener("submit", (event) => {
            if (!paymentForm.checkValidity()) {
                event.preventDefault();
                paymentForm.reportValidity();
                return;
            }
            event.preventDefault();
        });

        renderBills();
        updateTotalDue();
    </script>
</body>

</html>
