<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Customer - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="../shared/styles/base/floaty.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="row">
                    <div class="">
                        <div class="card content-card"
                            style="border: 1px solid #f1f5f9; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); background-color: #ffffff;">
                            <div class="card-body p-4 p-md-5">
                                <div class="d-flex align-items-center mb-4 border-bottom pb-4"
                                    style="border-color: #f1f5f9 !important;">
                                    <div class="d-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded text-primary me-3"
                                        style="width: 48px; height: 48px;">
                                        <i class="fa-solid fa-user fs-5"></i>
                                    </div>
                                    <div>
                                        <h5 class="fw-bold text-dark mb-1" style="font-size: 1.15rem;">Add New Customer</h5>
                                        <p class="text-muted small mb-0">Fill in details to create a new customer profile</p>
                                    </div>
                                </div>

                                <form>
                                    <div class="row g-4 pt-2">
                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <input type="text" class="form-control form-control-solid" placeholder=" " required>
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-id-card me-1 text-primary"></i> Name <span class="text-danger">*</span>
                                                </label>
                                            </div>
                                            <div class="text-muted small mt-1">Enter full name</div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <input type="email" class="form-control form-control-solid" placeholder=" ">
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-envelope me-1 text-primary"></i> Email
                                                </label>
                                            </div>
                                            <div class="text-muted small mt-1">Enter email address</div>
                                        </div>

                                        <div class="col-md-6">
                                            <label class="text-dark fw-semibold mb-2" style="font-size: 0.9rem;">
                                                <i class="fa-solid fa-image me-1 text-primary"></i> Upload Image
                                            </label>
                                            <input type="file" class="form-control form-control-solid" id="customerImageInput" accept="image/*">
                                            <div class="text-muted small mt-1">No file chosen</div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <input type="tel" class="form-control form-control-solid" placeholder=" " pattern="[0-9]{10}">
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-phone me-1 text-primary"></i> Phone Number
                                                </label>
                                            </div>
                                            <div class="text-muted small mt-1">Enter 10 digit contact No.</div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <input type="text" class="form-control form-control-solid" placeholder=" ">
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-location-dot me-1 text-primary"></i> Address
                                                </label>
                                            </div>
                                            <div class="text-muted small mt-1">Enter customer address</div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="floaty-input">
                                                <input type="text" class="form-control form-control-solid" placeholder=" ">
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-address-card me-1 text-primary"></i> Pan No
                                                </label>
                                            </div>
                                            <div class="text-muted small mt-1">Enter PAN no.</div>
                                        </div>

                                        <div class="col-12">
                                            <div class="floaty-input">
                                                <textarea class="form-control form-control-solid" placeholder=" " rows="4"></textarea>
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-pen-to-square me-1 text-primary"></i> Description
                                                </label>
                                            </div>
                                            <div class="text-muted small mt-1">Write about customer. . .</div>
                                        </div>

                                        <div class="col-12">
                                            <div class="border rounded-3 p-3 bg-light" style="border-color: #e2e8f0 !important;">
                                                <div class="fw-semibold text-dark mb-2" style="font-size: 0.9rem;">
                                                    <i class="fa-solid fa-image me-1 text-primary"></i> Image Preview
                                                </div>
                                                <div class="d-flex align-items-center justify-content-center bg-white rounded-3 overflow-hidden"
                                                    style="height: 220px; border: 1px dashed #cbd5e1;">
                                                    <img id="customerImagePreview" alt="Customer Preview" style="display: none; max-height: 100%; max-width: 100%; object-fit: contain;">
                                                    <div id="customerImagePreviewPlaceholder" class="text-muted small">Image preview</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="alert mt-4 mb-0"
                                        style="background-color: #fff8f1; border: 1px solid #ffe8cc; color: #d97706; border-radius: 8px; font-size: 0.85rem;">
                                        <i class="fa-solid fa-circle-info me-2"></i> <strong class="fw-bold">Note</strong> * Fields are mandatory
                                    </div>

                                    <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top"
                                        style="border-color: #f1f5f9 !important;">
                                        <a href="customer.html"
                                            class="btn px-4 bg-white text-dark border d-flex align-items-center gap-2 text-decoration-none"
                                            style="border-color: #e2e8f0 !important; border-radius: 6px; font-weight: 600; font-size: 0.85rem;">
                                            <i class="fa-solid fa-arrow-left"></i> Back
                                        </a>
                                        <button type="reset"
                                            class="btn px-4 bg-white text-dark border d-flex align-items-center gap-2"
                                            style="border-color: #e2e8f0 !important; border-radius: 6px; font-weight: 600; font-size: 0.85rem;">
                                            <i class="fa-solid fa-rotate-right"></i> Reset
                                        </button>
                                        <button type="submit" class="btn px-4 d-flex align-items-center gap-2 text-white"
                                            style="background-color: #1a56db; border-radius: 6px; font-weight: 600; font-size: 0.85rem; border: none;">
                                            <i class="fa-solid fa-paper-plane"></i> Save Customer
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/scripts/script.js"></script>
    <script>
        const imageInput = document.getElementById('customerImageInput');
        const imagePreview = document.getElementById('customerImagePreview');
        const imagePreviewPlaceholder = document.getElementById('customerImagePreviewPlaceholder');

        if (imageInput && imagePreview && imagePreviewPlaceholder) {
            imageInput.addEventListener('change', (event) => {
                const file = event.target.files && event.target.files[0];
                if (!file) {
                    imagePreview.style.display = 'none';
                    imagePreview.removeAttribute('src');
                    imagePreviewPlaceholder.style.display = 'block';
                    return;
                }

                const reader = new FileReader();
                reader.onload = () => {
                    imagePreview.src = reader.result;
                    imagePreview.style.display = 'block';
                    imagePreviewPlaceholder.style.display = 'none';
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>

</html>
