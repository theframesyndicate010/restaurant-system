<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Due - Smart Cafeteria</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="styles/customer-due.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/customer-due.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <!-- Mobile Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <!-- Sidebar Component -->
        <app-sidebar></app-sidebar>

        <!-- Main Content -->
        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <!-- Top Header Component -->
            <app-header></app-header>

            <!-- Customer Due Content -->
            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <!-- Page Header Card -->
                <div class="card page-header-card">
                    <div
                        class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Customer Due</h4>
                            <p class="page-header-subtitle">View and manage outstanding customer balances.</p>
                        </div>
                    </div>
                </div>



                <!-- Main Content Card -->
                <div class="card content-card">
                    <div class="card-body">
                        <!-- Data Table -->
                        <div class="table-responsive premium-table-box">
                            <table class="table align-middle mb-0 text-nowrap table-hover datatable-init">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">SN</th>
                                        <th>Customer</th>
                                        <th>Amount</th>
                                        <th style="width: 140px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><span class="sn-badge">1</span></td>
                                        <td class="name-cell">Naya Sahakari</td>
                                        <td>
                                            <span class="badge badge-inactive me-2"
                                                style="font-size: 0.75rem; padding: 5px 8px;">Due</span>
                                            <span class="fw-bold text-dark">18404.1</span>
                                        </td>
                                        <td>
                                            <a href="customer-payment.html"
                                                class="btn btn-sm fw-bold d-inline-flex align-items-center justify-content-center gap-1 shadow-sm px-3 py-1 btn-pay text-decoration-none"
                                                style="border-radius: 6px; background-color: #22c55e; color: white; border: 1px solid #16a34a;">
                                                <i class="fa-solid fa-money-bill-wave" style="font-size: 0.8rem;"></i>
                                                Pay
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <!-- Total Row -->
                                    <tr style="background-color: #f8fafc;">
                                        <td colspan="2" class="fw-bold text-dark border-end-0">Total Amount
                                        </td>
                                        <td class="fw-bold text-dark border-start-0 border-end-0" style="font-size: 1.05rem;">18404.1</td>
                                        <td class="border-start-0"></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS + Extensions -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component Scripts -->
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="../shared/scripts/script.js"></script>
    <!-- Custom Scripts -->
    <script src="scripts/customer-due.js"></script>
</body>

</html>
