<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Stock Issue - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="../shared/styles/base/floaty.css">
    <link rel="stylesheet" href="styles/add-staff-stock-issue.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">New Stock Issue</h4>
                            <p class="page-header-subtitle">Issue inventory items to staff and track opening stock details.</p>
                        </div>
                        <a href="staff-stock-issue.html"
                            class="btn px-3 d-inline-flex align-items-center gap-2 text-primary border-primary bg-white hover-elevate transition-all shadow-sm text-decoration-none"
                            style="border: 2px solid; border-radius: 8px; font-weight: 600; font-size: 0.85rem;">
                            <i class="fa-solid fa-arrow-left"></i> Back to List
                        </a>
                    </div>
                </div>

                <div class="card content-card border-0 shadow-sm" style="border-radius: 12px;">
                    <div class="card-body p-0">
                        <div class="p-4 border-bottom bg-white" style="border-top-left-radius: 12px; border-top-right-radius: 12px;">
                            <h5 class="fw-bold mb-1">New Stock Issue</h5>
                            <p class="text-muted small mb-0">Enter the issue details below.</p>
                        </div>

                        <form id="newStockIssueForm" class="p-4 p-lg-5">
                            <div id="issueFormMessage" class="alert d-none mb-4" role="alert"></div>

                            <div class="row g-4">
                                <div class="col-12 col-lg-6">
                                    <div class="floaty-input">
                                        <select id="receiverStaff" class="form-control form-control-solid issue-input" required>
                                            <option value="" selected disabled>-- Select Staff --</option>
                                            <option value="Ramesh Thapa">Ramesh Thapa</option>
                                            <option value="Sita Rai">Sita Rai</option>
                                            <option value="Prakash KC">Prakash KC</option>
                                            <option value="Maya Shrestha">Maya Shrestha</option>
                                            <option value="Ram Bista">Ram Bista</option>
                                            <option value="Nisha Gurung">Nisha Gurung</option>
                                        </select>
                                        <label class="text-dark">
                                            <i class="fa-solid fa-user me-1 text-primary"></i> Receiver (Staff) <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12 col-lg-6">
                                    <div class="floaty-input">
                                        <select id="menuItem" class="form-control form-control-solid issue-input" required>
                                            <option value="" data-opening-stock="0" selected disabled>-- Select Item --</option>
                                            <option value="Fresh Milk (1L)" data-opening-stock="42">Fresh Milk (1L)</option>
                                            <option value="Refined Sugar (1Kg)" data-opening-stock="18">Refined Sugar (1Kg)</option>
                                            <option value="Tea Dust (500g)" data-opening-stock="8">Tea Dust (500g)</option>
                                            <option value="Paper Cups (100pcs)" data-opening-stock="64">Paper Cups (100pcs)</option>
                                            <option value="Napkin Pack" data-opening-stock="30">Napkin Pack</option>
                                        </select>
                                        <label class="text-dark">
                                            <i class="fa-solid fa-utensils me-1 text-primary"></i> Menu Item <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12 col-lg-6">
                                    <div class="floaty-input">
                                        <input type="datetime-local" id="issueDate" class="form-control form-control-solid issue-input" placeholder=" "
                                            value="2026-04-12T06:43">
                                        <label class="text-dark">
                                            <i class="fa-solid fa-calendar-days me-1 text-primary"></i> Issue Date
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12 col-lg-6">
                                    <div class="floaty-input">
                                        <input type="number" id="openingStock" class="form-control form-control-solid issue-input" placeholder=" "
                                            value="0" min="0" step="1">
                                        <label class="text-dark">
                                            <i class="fa-solid fa-cubes-stacked me-1 text-primary"></i> Opening Stock (Quantity)
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex flex-column flex-sm-row justify-content-end gap-2 mt-4">
                                <button type="reset" id="resetIssueForm" class="btn btn-outline-secondary px-4">
                                    <i class="fa-solid fa-rotate-right me-1"></i> Reset
                                </button>
                                <button type="submit" class="btn page-header-btn px-4">
                                    <i class="fa-solid fa-floppy-disk me-1"></i> Save Issue
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/scripts/script.js"></script>
    <script src="scripts/add_staff_stock_issue.js"></script>
</body>

</html>
