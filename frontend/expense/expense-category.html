<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Category - Smart Cafeteria</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/expense-category.css">
</head>

<body class="expense-category-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Existing Expense Category</h4>
                        <p class="page-header-subtitle">View available expense categories and created records.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card expense-category-filter-card">
                    <div class="card-body">
                        <div class="expense-category-toolbar-row">
                            <button type="button" id="addExpenseCategoryBtn" class="btn expense-category-add-btn">
                                <i class="fa-solid fa-plus"></i>
                                <span>Add New Expense Category</span>
                            </button>

                            <input
                                id="expenseCategorySearch"
                                type="search"
                                class="form-control filter-search-input expense-category-search"
                                placeholder="Search by code or title"
                                aria-label="Search expense category"
                            >

                            <select id="expenseCategoryPageLength" class="form-select filter-dropdown expense-category-page-length" aria-label="Page length">
                                <option value="10" selected>10</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>

                            <button type="button" id="expenseCategoryRefreshBtn" class="btn expense-category-refresh-btn" title="Refresh">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box expense-category-table-shell">
                            <table class="table align-middle mb-0 table-hover expense-category-table datatable-init" id="expenseCategoryTable">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Code</th>
                                        <th>Title</th>
                                        <th>Created By</th>
                                        <th>Created At</th>
                                    </tr>
                                </thead>
                                <tbody id="expenseCategoryTableBody"></tbody>
                            </table>
                        </div>

                        <template id="expenseCategoryCellSnTemplate">
                            <span class="expense-category-sn">0</span>
                        </template>

                        <template id="expenseCategoryCellCodeTemplate">
                            <span class="expense-category-code"></span>
                        </template>

                        <template id="expenseCategoryCellTitleTemplate">
                            <span class="expense-category-title"></span>
                        </template>

                        <template id="expenseCategoryCellCreatedByTemplate">
                            <span class="expense-category-created-by"></span>
                        </template>

                        <template id="expenseCategoryCellCreatedAtTemplate">
                            <span class="expense-category-created-at"></span>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/expense-category.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
