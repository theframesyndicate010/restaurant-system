<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Expense Category - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="../shared/styles/base/floaty.css">
    <link rel="stylesheet" href="styles/add-expense-category.css">
</head>

<body class="add-expense-category-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Add New Expense Category</h4>
                            <p class="page-header-subtitle">Create a category title to group office expense entries.</p>
                        </div>
                        <a href="expense-category.html" class="btn btn-outline-light add-expense-category-back-btn text-decoration-none d-inline-flex align-items-center gap-2">
                            <i class="fa-solid fa-arrow-left"></i>
                            Back to Expense Category
                        </a>
                    </div>
                </div>

                <div class="card content-card add-expense-category-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="add-expense-category-head d-flex align-items-center border-bottom pb-4 mb-4">
                            <div class="add-expense-category-head-icon">
                                <i class="fa-solid fa-list-check"></i>
                            </div>
                            <div>
                                <h5 class="fw-bold text-dark mb-1">Expense Category</h5>
                                <p class="text-muted small mb-0">Fill the required field to create the category.</p>
                            </div>
                        </div>

                        <div id="addExpenseCategoryAlert" class="alert d-none mb-4" role="alert"></div>

                        <form id="addExpenseCategoryForm" novalidate>
                            <div class="row g-4 pt-1">
                                <div class="col-12">
                                    <div class="floaty-input">
                                        <input id="expenseCategoryTitle" type="text" class="form-control form-control-solid" placeholder=" " required>
                                        <label class="text-dark">
                                            <i class="fa-solid fa-tag me-1 text-primary"></i> Expense Category Title <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="alert add-expense-category-note mt-4 mb-0">
                                <i class="fa-solid fa-circle-info me-2"></i>
                                <strong>Note:</strong> * Fields are mandatory.
                            </div>

                            <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top add-expense-category-actions">
                                <a href="expense-category.html" class="btn btn-outline-secondary px-4 d-inline-flex align-items-center gap-2 text-decoration-none">
                                    <i class="fa-solid fa-arrow-left"></i> Back
                                </a>
                                <button type="reset" id="addExpenseCategoryResetBtn" class="btn btn-outline-secondary px-4 d-inline-flex align-items-center gap-2">
                                    <i class="fa-solid fa-rotate-right"></i> Reset
                                </button>
                                <button type="submit" class="btn add-expense-category-save-btn px-4 d-inline-flex align-items-center gap-2">
                                    <i class="fa-solid fa-floppy-disk"></i> Save Category
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="scripts/add_expense_category.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
