<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Setup - Smart Cafeteria</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables CSS + Extensions -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="styles/discount-setup.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <!-- Mobile Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <!-- Sidebar Component -->
        <app-sidebar></app-sidebar>

        <!-- Main Content -->
        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <!-- Top Header Component -->
            <app-header></app-header>

            <!-- Discount Setup Content -->
            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <!-- Page Header Card -->
                <div class="card page-header-card">
                    <div
                        class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Billing Discount Setup</h4>
                            <p class="page-header-subtitle">Create and manage billing discount rules.</p>
                        </div>
                        <a href="add-discount.html" class="btn page-header-btn text-decoration-none">
                            <i class="fa-solid fa-plus pt-1 d-inline-block"></i> Create New Discount
                        </a>
                    </div>
                </div>


                <!-- Main Content Card -->
                <div class="card content-card">
                    <div class="card-body">
                        <!-- Data Table -->
                        <div class="table-responsive premium-table-box">
                            <table class="display table align-middle mb-0 text-nowrap datatable-init">
                                <thead>
                                    <tr>
                                        <th style="width: 60px;">SN</th>
                                        <th style="min-width: 250px;">Amount Range</th>
                                        <th style="min-width: 150px;">Type</th>
                                        <th style="min-width: 120px;">Value</th>
                                        <th style="min-width: 150px;">Current Status</th>
                                        <th style="min-width: 150px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Row 1 -->
                                    <tr>
                                        <td><span class="sn-badge">1</span></td>
                                        <td class="fw-bold text-dark">Rs. 20,000 - Rs. 25,000</td>
                                        <td>
                                            <span class="badge"
                                                style="background-color: #e0f2fe; color: #0ea5e9; font-weight: 600; padding: 6px 16px; border-radius: 6px;">Percentage</span>
                                        </td>
                                        <td class="fw-bold" style="color: var(--primary-blue);">10%</td>
                                        <td>
                                            <span class="badge badge-active d-inline-flex align-items-center gap-1">
                                                <i class="fa-solid fa-circle-check" style="font-size: 0.7rem;"></i>
                                                Active
                                            </span>
                                        </td>
                                        <td>
                                            <div class="d-flex align-items-center justify-content-center gap-2">
                                                <button class="action-btn action-btn-view"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="action-btn action-btn-edit"><i
                                                        class="fa-solid fa-pen"></i></button>
                                                <button class="action-btn action-btn-delete"><i
                                                        class="fa-solid fa-trash"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <!-- Row 2 -->
                                    <tr>
                                        <td><span class="sn-badge">2</span></td>
                                        <td class="fw-bold text-dark">Rs. 5,000 - Rs. 10,000</td>
                                        <td>
                                            <span class="badge"
                                                style="background-color: #e0f2fe; color: #0ea5e9; font-weight: 600; padding: 6px 16px; border-radius: 6px;">Percentage</span>
                                        </td>
                                        <td class="fw-bold" style="color: var(--primary-blue);">10%</td>
                                        <td>
                                            <span class="badge badge-inactive d-inline-flex align-items-center gap-1">
                                                <i class="fa-solid fa-circle-xmark" style="font-size: 0.7rem;"></i>
                                                Disabled
                                            </span>
                                        </td>
                                        <td>
                                            <div class="d-flex align-items-center justify-content-center gap-2">
                                                <button class="action-btn action-btn-view"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="action-btn action-btn-edit"><i
                                                        class="fa-solid fa-pen"></i></button>
                                                <button class="action-btn action-btn-delete"><i
                                                        class="fa-solid fa-trash"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- jQuery (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS + Extensions -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component Scripts -->
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="../shared/scripts/script.js"></script>
    <!-- Page Script -->
    <script src="scripts/discount-setup.js"></script>
</body>

</html>
