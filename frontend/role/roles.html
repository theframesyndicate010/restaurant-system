<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles - Smart Cafeteria</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/roles.css">
</head>

<body class="roles-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Roles</h4>
                        <p class="page-header-subtitle">Manage staff roles and activation status in one place.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card roles-filter-card">
                    <div class="card-body">
                        <div class="roles-toolbar-row">
                            <button type="button" id="addRoleBtn" class="btn roles-add-btn">
                                <i class="fa-solid fa-plus"></i>
                                <span>Add New Role</span>
                            </button>

                            <input
                                id="roleSearch"
                                type="search"
                                class="form-control filter-search-input roles-search"
                                placeholder="Role Name"
                                aria-label="Search role"
                            >

                            <select id="rolePageLength" class="form-select filter-dropdown roles-page-length" aria-label="Page length">
                                <option value="10" selected>10</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>

                            <button type="button" id="roleRefreshBtn" class="btn roles-refresh-btn" title="Refresh">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box roles-table-shell">
                            <table class="table align-middle mb-0 table-hover roles-table datatable-init" id="rolesTable">
                                <thead>
                                    <tr>
                                        <th>SN</th>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="roleTableBody"></tbody>
                            </table>
                        </div>

                        <template id="roleCellSnTemplate">
                            <span class="role-sn">0</span>
                        </template>

                        <template id="roleCellNameTemplate">
                            <span class="role-name"></span>
                        </template>

                        <template id="roleCellStatusTemplate">
                            <span class="role-status-badge">Enabled</span>
                        </template>

                        <template id="roleCellActionsTemplate">
                            <div class="d-flex justify-content-center role-action-wrap">
                                <button type="button" class="action-btn role-toggle-btn" title="Toggle Status">
                                    <i class="fa-regular fa-thumbs-down"></i>
                                </button>
                                <button type="button" class="action-btn action-btn-edit role-edit-btn" title="Edit">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button type="button" class="action-btn action-btn-delete role-delete-btn" title="Delete">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/roles.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
