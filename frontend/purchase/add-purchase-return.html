<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Purchase Return - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="styles/add-purchase-return.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="add-purchase-return-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title">Add Purchase Return</h4>
                            <p class="page-header-subtitle">Create a purchase return with supplier, invoice, item details, and total calculations.</p>
                        </div>
                        <a href="purchase-return.html" class="btn btn-outline-light purchase-return-back-btn d-inline-flex align-items-center gap-2 text-decoration-none">
                            <i class="fa-solid fa-arrow-left"></i>
                            Back to Purchase Return
                        </a>
                    </div>
                </div>

                <div class="card purchase-return-entry-card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div id="purchaseReturnEntryMessage" class="alert d-none m-3 mb-0" role="alert"></div>

                        <div class="purchase-return-entry-layout">
                            <section class="purchase-return-workspace">
                                <div class="purchase-return-toolbar">
                                    <select id="prSupplierSelect" class="pr-control pr-select" aria-label="Select supplier">
                                        <option value="">---Select Supplier---</option>
                                    </select>

                                    <select id="prInvoiceSelect" class="pr-control pr-select" aria-label="Select invoice">
                                        <option value="">--- Select Invoice ---</option>
                                    </select>

                                    <select id="prItemSelect" class="pr-control pr-select" aria-label="Select item">
                                        <option value="">--- Select Item ---</option>
                                    </select>

                                    <button type="button" id="prAddItemBtn" class="btn pr-add-btn">
                                        <i class="fa-solid fa-plus"></i>
                                        <span>Add</span>
                                    </button>
                                </div>

                                <div class="purchase-return-table-wrap">
                                    <table class="table align-middle mb-0 purchase-return-entry-table">
                                        <thead>
                                            <tr>
                                                <th>Item Code</th>
                                                <th>Item Name</th>
                                                <th>Qty</th>
                                                <th>Unit</th>
                                                <th class="text-end">Rate</th>
                                                <th class="text-end">Sub Total</th>
                                                <th class="text-end">Tax Rtn</th>
                                            </tr>
                                        </thead>
                                        <tbody id="prEntryTableBody">
                                            <tr class="pr-empty-row">
                                                <td colspan="7">Choose supplier, invoice, and item to start adding purchase return rows.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div class="purchase-return-table-footer">
                                    <div class="total-items-line">
                                        Total Items:
                                        <span id="prTotalItemsBadge" class="total-items-badge">0</span>
                                    </div>
                                </div>
                            </section>

                            <aside class="purchase-return-summary">
                                <div class="summary-title">Return Summary</div>

                                <div class="summary-field-group summary-date-group">
                                    <label for="prReturnDate" class="summary-label">Date</label>
                                    <input id="prReturnDate" type="text" class="summary-input" value="2082-12-30" placeholder="YYYY-MM-DD" aria-label="Return date">
                                </div>

                                <div class="summary-divider"></div>

                                <div class="summary-field-group">
                                    <label for="prSubTotal" class="summary-label">Sub Total</label>
                                    <input id="prSubTotal" type="text" class="summary-input summary-number summary-highlight" value="0.00" readonly>
                                </div>

                                <div class="summary-field-group">
                                    <label for="prTaxReturn" class="summary-label">Tax Return</label>
                                    <input id="prTaxReturn" type="text" class="summary-input summary-number" value="0.00" readonly>
                                </div>

                                <div class="summary-field-group">
                                    <label for="prGrandTotal" class="summary-label">Total</label>
                                    <input id="prGrandTotal" type="text" class="summary-input summary-number summary-highlight" value="0.00" readonly>
                                </div>

                                <div class="summary-field-group mt-3">
                                    <textarea id="prRemarks" class="summary-remarks" rows="5" placeholder="Add remarks for purchase return."></textarea>
                                </div>

                                <div class="summary-actions">
                                    <a href="purchase-return.html" id="prCancelBtn" class="btn pr-btn-cancel text-decoration-none">
                                        <span>Cancel</span>
                                        <i class="fa-solid fa-xmark"></i>
                                    </a>
                                    <button type="button" id="prSaveBtn" class="btn pr-btn-save">
                                        <span>Save</span>
                                        <i class="fa-solid fa-floppy-disk"></i>
                                    </button>
                                </div>
                            </aside>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <template id="prEntryRowTemplate">
        <tr>
            <td><span class="pr-item-code"></span></td>
            <td>
                <div class="pr-item-name-wrap">
                    <span class="pr-item-name"></span>
                    <button type="button" class="btn btn-link p-0 pr-remove-item" title="Remove item">
                        <i class="fa-solid fa-circle-xmark"></i>
                    </button>
                </div>
            </td>
            <td>
                <input type="number" class="pr-qty-input" min="1" step="1" value="1" aria-label="Quantity">
            </td>
            <td><span class="pr-item-unit"></span></td>
            <td>
                <input type="number" class="pr-rate-input text-end" min="0" step="0.01" value="0" aria-label="Rate">
            </td>
            <td class="text-end"><span class="pr-subtotal">0.00</span></td>
            <td class="text-end"><span class="pr-tax-return">0.00</span></td>
        </tr>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="scripts/add_purchase_return.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
