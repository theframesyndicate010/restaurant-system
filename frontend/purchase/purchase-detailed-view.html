<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Detail - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="styles/purchase-detailed-view.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="purchase-detail-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="page-header-title" id="purchaseDetailTitle">Purchase Details</h4>
                            <p class="page-header-subtitle mb-0" id="purchaseDetailSubtitle">Invoice line items</p>
                        </div>
                        <a href="purchase.html" class="btn btn-outline-light d-inline-flex align-items-center gap-2 purchase-detail-back-btn">
                            <i class="fa-solid fa-arrow-left"></i>
                            Back to Purchase
                        </a>
                    </div>
                </div>

                <div class="card filter-toolbar-card purchase-summary-card">
                    <div class="card-body">
                        <div class="purchase-summary-grid">
                            <div class="purchase-summary-item">
                                <span class="label">Supplier</span>
                                <strong id="purchaseDetailSupplier">-</strong>
                            </div>
                            <div class="purchase-summary-item">
                                <span class="label">Date</span>
                                <strong id="purchaseDetailDate">-</strong>
                            </div>
                            <div class="purchase-summary-item">
                                <span class="label">Status</span>
                                <strong id="purchaseDetailStatus">-</strong>
                            </div>
                            <div class="purchase-summary-item">
                                <span class="label">Payment Type</span>
                                <strong id="purchaseDetailPayment">-</strong>
                            </div>
                            <div class="purchase-summary-item">
                                <span class="label">Bill Amount</span>
                                <strong id="purchaseDetailBill">Rs. 0.00</strong>
                            </div>
                            <div class="purchase-summary-item">
                                <span class="label">Paid</span>
                                <strong id="purchaseDetailPaid">Rs. 0.00</strong>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box purchase-detail-table-shell">
                            <table class="table align-middle mb-0 table-hover purchase-detail-table">
                                <thead>
                                    <tr>
                                        <th style="width: 90px;">S.N.</th>
                                        <th>Item</th>
                                        <th class="text-end" style="width: 150px;">Qty</th>
                                        <th class="text-end" style="width: 180px;">Rate</th>
                                        <th class="text-end" style="width: 200px;">Amount</th>
                                    </tr>
                                </thead>
                                <tbody id="purchaseDetailBody"></tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="4" class="text-end purchase-detail-total-label">Total</td>
                                        <td class="text-end purchase-detail-total-amount" id="purchaseDetailTotal">Rs. 0.00</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <template id="purchaseDetailRowTemplate">
                            <tr>
                                <td><span class="purchase-detail-sn"></span></td>
                                <td><span class="purchase-detail-item"></span></td>
                                <td class="text-end"><span class="purchase-detail-qty"></span></td>
                                <td class="text-end"><span class="purchase-detail-rate"></span></td>
                                <td class="text-end"><span class="purchase-detail-amount"></span></td>
                            </tr>
                        </template>

                        <template id="purchaseDetailEmptyRowTemplate">
                            <tr>
                                <td colspan="5" class="text-muted py-4">No item details available.</td>
                            </tr>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="scripts/purchase-detailed-view.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
