<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Return - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/purchase-return.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="purchase-return-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Purchase Return</h4>
                        <p class="page-header-subtitle">Track supplier returns, monitor returned amount, and review return remarks quickly.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card purchase-return-filter-card">
                    <div class="card-body">
                        <div class="purchase-return-toolbar-row">
                            <a href="add-purchase-return.html" id="addPurchaseReturnBtn" class="btn purchase-return-new-btn text-decoration-none">
                                <i class="fa-solid fa-plus"></i>
                                <span>Add Purchase Return</span>
                            </a>

                            <input
                                id="purchaseReturnSearch"
                                type="search"
                                class="form-control filter-search-input purchase-return-search"
                                placeholder="Supplier Name, Remarks.."
                                aria-label="Search supplier and remarks"
                            >

                            <select id="purchaseReturnPageLength" class="form-select filter-dropdown purchase-return-page-length" aria-label="Page length">
                                <option value="10">10</option>
                                <option value="25">25</option>
                                <option value="50" selected>50</option>
                                <option value="100">100</option>
                            </select>

                            <button type="button" id="purchaseReturnRefreshBtn" class="btn purchase-return-refresh-btn" title="Refresh">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box purchase-return-table-shell">
                            <table class="table align-middle mb-0 table-hover purchase-return-table datatable-init">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Supplier</th>
                                        <th class="text-end">Amount</th>
                                        <th>Remarks</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="purchaseReturnTableBody"></tbody>
                            </table>
                        </div>

                        <template id="purchaseReturnCellSnTemplate">
                            <span class="purchase-return-sn">0</span>
                        </template>

                        <template id="purchaseReturnCellDateTemplate">
                            <span class="purchase-return-date"></span>
                        </template>

                        <template id="purchaseReturnCellSupplierTemplate">
                            <span class="purchase-return-supplier"></span>
                        </template>

                        <template id="purchaseReturnCellAmountTemplate">
                            <span class="purchase-return-amount"></span>
                        </template>

                        <template id="purchaseReturnCellRemarksTemplate">
                            <span class="purchase-return-remarks"></span>
                        </template>

                        <template id="purchaseReturnCellActionsTemplate">
                            <div class="d-flex justify-content-center gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary shadow-sm action-btn purchase-return-view-btn" title="View">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-primary shadow-sm action-btn purchase-return-edit-btn" title="Edit">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger shadow-sm action-btn purchase-return-delete-btn" title="Delete">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/purchase-return.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
