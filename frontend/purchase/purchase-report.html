<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Report - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/purchase-report.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="purchase-report-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Purchase Report</h4>
                        <p class="page-header-subtitle">Analyze supplier-wise purchases with date range filtering and printable report output.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card purchase-report-filter-card">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-12 col-md-6 col-xl-3">
                                <label class="form-label" for="purchaseReportFromDate">From</label>
                                <input id="purchaseReportFromDate" type="text" class="form-control filter-search-input" value="2082-12-30" placeholder="YYYY-MM-DD" aria-label="From date">
                            </div>

                            <div class="col-12 col-md-6 col-xl-3">
                                <label class="form-label" for="purchaseReportToDate">To</label>
                                <input id="purchaseReportToDate" type="text" class="form-control filter-search-input" value="2082-12-30" placeholder="YYYY-MM-DD" aria-label="To date">
                            </div>

                            <div class="col-12 col-lg-6 col-xl-3">
                                <label class="form-label" for="purchaseReportSupplier">Supplier</label>
                                <select id="purchaseReportSupplier" class="form-select filter-dropdown" aria-label="Select supplier">
                                    <option value="">Select Supplier</option>
                                </select>
                            </div>

                            <div class="col-12 col-lg-6 col-xl-3">
                                <label class="form-label">Actions</label>
                                <div class="purchase-report-actions">
                                    <button type="button" id="purchaseReportLoadBtn" class="btn purchase-report-load-btn">
                                        <span>Load</span>
                                        <i class="fa-solid fa-spinner"></i>
                                    </button>

                                    <button type="button" id="purchaseReportPrintBtn" class="btn purchase-report-icon-btn purchase-report-print-btn" title="Print">
                                        <i class="fa-solid fa-print"></i>
                                    </button>

                                    <button type="button" id="purchaseReportPdfBtn" class="btn purchase-report-icon-btn purchase-report-pdf-btn" title="Export PDF">
                                        <i class="fa-regular fa-file-pdf"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box purchase-report-table-shell">
                            <table class="table align-middle mb-0 table-hover purchase-report-table datatable-init">
                                <thead>
                                    <tr>
                                        <th>S.N</th>
                                        <th>Date</th>
                                        <th>Supplier</th>
                                        <th>Invoice No</th>
                                        <th class="text-end">Amount</th>
                                        <th class="text-end">Discount</th>
                                        <th class="text-end">Paid Amount</th>
                                        <th class="text-end">Due Amount</th>
                                        <th>Remarks</th>
                                    </tr>
                                </thead>
                                <tbody id="purchaseReportTableBody"></tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="4" class="text-end purchase-report-total-label">Total</td>
                                        <td class="text-end purchase-report-total-value" id="purchaseReportTotalAmount">0.00</td>
                                        <td class="text-end purchase-report-total-value" id="purchaseReportTotalDiscount">0.00</td>
                                        <td class="text-end purchase-report-total-value" id="purchaseReportTotalPaid">0.00</td>
                                        <td class="text-end purchase-report-total-value" id="purchaseReportTotalDue">0.00</td>
                                        <td></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <template id="purchaseReportCellSnTemplate">
                            <span class="purchase-report-sn">0</span>
                        </template>

                        <template id="purchaseReportCellDateTemplate">
                            <span class="purchase-report-date"></span>
                        </template>

                        <template id="purchaseReportCellSupplierTemplate">
                            <span class="purchase-report-supplier"></span>
                        </template>

                        <template id="purchaseReportCellInvoiceTemplate">
                            <span class="purchase-report-invoice"></span>
                        </template>

                        <template id="purchaseReportCellAmountTemplate">
                            <span class="purchase-report-amount"></span>
                        </template>

                        <template id="purchaseReportCellDiscountTemplate">
                            <span class="purchase-report-discount"></span>
                        </template>

                        <template id="purchaseReportCellPaidTemplate">
                            <span class="purchase-report-paid"></span>
                        </template>

                        <template id="purchaseReportCellDueTemplate">
                            <span class="purchase-report-due"></span>
                        </template>

                        <template id="purchaseReportCellRemarksTemplate">
                            <span class="purchase-report-remarks"></span>
                        </template>

                        <template id="purchaseReportPrintPageTemplate">
                            <html>
                            <head>
                                <title data-report-title></title>
                                <style>
                                    body { font-family: Arial, sans-serif; margin: 20px; color: #1f2937; }
                                    h2 { margin: 0 0 10px; color: #0f172a; }
                                    p { margin: 4px 0; font-size: 13px; color: #334155; }
                                    table { width: 100%; border-collapse: collapse; margin-top: 14px; }
                                    th, td { border: 1px solid #d1d5db; padding: 8px 10px; font-size: 12px; }
                                    th { background: #f1f5f9; text-align: left; }
                                    td.amount { text-align: right; }
                                    tfoot td { background: #f8fafc; font-weight: 700; }
                                </style>
                            </head>
                            <body>
                                <h2 data-report-heading></h2>
                                <p><strong>From:</strong> <span data-report-from></span></p>
                                <p><strong>To:</strong> <span data-report-to></span></p>
                                <p><strong>Supplier:</strong> <span data-report-supplier></span></p>
                                <p><strong>Generated On:</strong> <span data-report-generated-on></span></p>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>S.N</th>
                                            <th>Date</th>
                                            <th>Supplier</th>
                                            <th>Invoice No</th>
                                            <th>Amount</th>
                                            <th>Discount</th>
                                            <th>Paid Amount</th>
                                            <th>Due Amount</th>
                                            <th>Remarks</th>
                                        </tr>
                                    </thead>
                                    <tbody data-report-body></tbody>
                                    <tfoot>
                                        <tr>
                                            <td colspan="4" style="text-align:right;">Total</td>
                                            <td class="amount" data-report-total-amount></td>
                                            <td class="amount" data-report-total-discount></td>
                                            <td class="amount" data-report-total-paid></td>
                                            <td class="amount" data-report-total-due></td>
                                            <td></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </body>
                            </html>
                        </template>

                        <template id="purchaseReportPrintRowTemplate">
                            <tr>
                                <td data-col-sn></td>
                                <td data-col-date></td>
                                <td data-col-supplier></td>
                                <td data-col-invoice></td>
                                <td class="amount" data-col-amount></td>
                                <td class="amount" data-col-discount></td>
                                <td class="amount" data-col-paid></td>
                                <td class="amount" data-col-due></td>
                                <td data-col-remarks></td>
                            </tr>
                        </template>

                        <template id="purchaseReportPrintEmptyRowTemplate">
                            <tr>
                                <td colspan="9" style="text-align:center;padding:14px;">No records found.</td>
                            </tr>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/purchase-report.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
