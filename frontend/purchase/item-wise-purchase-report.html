<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Wise Purchase Report - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/item-wise-purchase-report.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="item-wise-purchase-report-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Item Wise Purchase Report</h4>
                        <p class="page-header-subtitle">View item-wise purchases within a date range and selected item.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card item-wise-report-filter-card">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-12 col-md-6 col-xl-3">
                                <label class="form-label" for="itemWiseReportFromDate">From</label>
                                <input id="itemWiseReportFromDate" type="text" class="form-control filter-search-input" value="2082-10-01" aria-label="From date">
                            </div>

                            <div class="col-12 col-md-6 col-xl-3">
                                <label class="form-label" for="itemWiseReportToDate">To</label>
                                <input id="itemWiseReportToDate" type="text" class="form-control filter-search-input" value="2082-12-30" aria-label="To date">
                            </div>

                            <div class="col-12 col-lg-6 col-xl-3">
                                <label class="form-label" for="itemWiseReportItem">Item</label>
                                <select id="itemWiseReportItem" class="form-select filter-dropdown" aria-label="Select item">
                                    <option value="Balvenie 25Y" selected>Balvenie 25Y</option>
                                </select>
                            </div>

                            <div class="col-12 col-lg-6 col-xl-3">
                                <label class="form-label">Actions</label>
                                <div class="item-wise-report-actions">
                                    <button type="button" id="itemWiseReportLoadBtn" class="btn item-wise-load-btn">
                                        <span>Load</span>
                                        <i class="fa-solid fa-spinner" aria-hidden="true"></i>
                                    </button>

                                    <button type="button" id="itemWiseReportPrintBtn" class="btn item-wise-icon-btn item-wise-print-btn" title="Print">
                                        <i class="fa-solid fa-print"></i>
                                    </button>

                                    <button type="button" id="itemWiseReportPdfBtn" class="btn item-wise-icon-btn item-wise-pdf-btn" title="Export PDF">
                                        <i class="fa-regular fa-file-pdf"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box item-wise-report-table-shell">
                            <table class="table align-middle mb-0 table-hover item-wise-report-table datatable-init">
                                <thead>
                                    <tr>
                                        <th>Sn</th>
                                        <th>Purchased Date</th>
                                        <th>Quantity</th>
                                        <th>Stock Unit</th>
                                    </tr>
                                </thead>
                                <tbody id="itemWiseReportTableBody"></tbody>
                            </table>
                        </div>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/item-wise-purchase-report.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
