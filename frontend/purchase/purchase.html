<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/purchase.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="purchase-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Purchase</h4>
                        <p class="page-header-subtitle">Manage supplier purchases with quick filtering by date, tax type, and payment status.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card purchase-filter-card">
                    <div class="card-body">
                        <div class="purchase-toolbar-row">
                            <div class="dropdown purchase-new-dropdown">
                                <button
                                    type="button"
                                    class="btn purchase-new-btn dropdown-toggle"
                                    id="purchaseNewDropdown"
                                    data-bs-toggle="dropdown"
                                    aria-expanded="false"
                                >
                                    <i class="fa-solid fa-plus"></i>
                                    <span>-- New Purchase --</span>
                                </button>
                                <ul class="dropdown-menu shadow-sm" aria-labelledby="purchaseNewDropdown">
                                    <li><a class="dropdown-item" href="#">Purchase Entry</a></li>
                                    <li><a class="dropdown-item" href="#">Quick Purchase</a></li>
                                </ul>
                            </div>

                            <label class="purchase-filter-label" for="purchaseFromDate">Filter:</label>

                            <input id="purchaseFromDate" type="text" class="form-control filter-search-input purchase-filter-input purchase-date-input" value="2082-12-29" aria-label="From date">

                            <input id="purchaseToDate" type="text" class="form-control filter-search-input purchase-filter-input purchase-date-input" value="2082-12-29" aria-label="To date">

                            <select id="purchaseTaxType" class="form-select filter-dropdown purchase-filter-input purchase-tax-select" aria-label="Tax type">
                                <option value="">-- Tax Type --</option>
                                <option value="Tax">Tax</option>
                                <option value="No Tax">No Tax</option>
                            </select>

                            <select id="purchaseStatus" class="form-select filter-dropdown purchase-filter-input purchase-status-select" aria-label="Status">
                                <option value="">-- Status --</option>
                                <option value="Paid">Paid</option>
                                <option value="Partial">Partial</option>
                                <option value="Pending">Pending</option>
                            </select>

                            <input id="purchaseSearch" type="search" class="form-control filter-search-input purchase-filter-input purchase-search" placeholder="Supplier / Invoice / Remarks" aria-label="Search supplier invoice remarks">

                            <select id="purchasePageLength" class="form-select filter-dropdown purchase-filter-input purchase-page-length" aria-label="Page length">
                                <option value="10">10</option>
                                <option value="25">25</option>
                                <option value="50" selected>50</option>
                                <option value="100">100</option>
                            </select>

                            <button type="button" id="purchaseRefreshBtn" class="btn purchase-refresh-btn" title="Refresh">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box purchase-table-shell">
                            <table class="table align-middle mb-0 table-hover purchase-table datatable-init">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Supplier</th>
                                        <th>Invoice No</th>
                                        <th class="text-end">Bill Amount</th>
                                        <th>Payment Type</th>
                                        <th class="text-end">Paid</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="purchaseTableBody"></tbody>
                            </table>
                        </div>

                        <template id="purchaseCellSnTemplate">
                            <span class="purchase-sn">0</span>
                        </template>

                        <template id="purchaseCellDateTemplate">
                            <span class="purchase-date"></span>
                        </template>

                        <template id="purchaseCellSupplierTemplate">
                            <span class="purchase-supplier"></span>
                            <span class="purchase-remarks"></span>
                        </template>

                        <template id="purchaseCellInvoiceTemplate">
                            <span class="purchase-invoice"></span>
                        </template>

                        <template id="purchaseCellBillTemplate">
                            <span class="purchase-bill-amount"></span>
                        </template>

                        <template id="purchaseCellPaymentTemplate">
                            <span class="purchase-payment-pill"></span>
                        </template>

                        <template id="purchaseCellPaidTemplate">
                            <span class="purchase-paid-amount"></span>
                        </template>

                        <template id="purchaseCellStatusTemplate">
                            <span class="purchase-status-pill"></span>
                        </template>

                        <template id="purchaseCellActionsTemplate">
                            <div class="d-flex justify-content-center gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary shadow-sm action-btn purchase-view-btn" title="View">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-primary shadow-sm action-btn purchase-edit-btn" title="Edit">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger shadow-sm action-btn purchase-delete-btn" title="Delete">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/purchase.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
