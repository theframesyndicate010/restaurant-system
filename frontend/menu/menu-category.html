<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Category - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/menu-category.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="menu-category-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Menu Category</h4>
                        <p class="page-header-subtitle">Manage menu groups and control where each category appears in the menu.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card menu-category-toolbar-card">
                    <div class="card-body">
                        <div class="d-flex flex-column flex-lg-row gap-3 align-items-stretch align-items-lg-center">
                            <a href="create-menu-category.html" class="btn page-header-btn menu-category-add-btn text-decoration-none">
                                <i class="fa-solid fa-plus"></i> Add New Menu Category
                            </a>

                            <div class="d-flex flex-wrap align-items-center gap-2 ms-lg-auto menu-category-controls">
                                <input type="search" id="menuCategorySearch" class="form-control filter-search-input menu-category-search"
                                    placeholder="Name">

                                <select id="menuCategoryPageLength" class="form-select filter-dropdown menu-category-length">
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50" selected>50</option>
                                    <option value="100">100</option>
                                </select>

                                <button type="button" id="menuCategoryRefresh" class="btn menu-category-refresh-btn" title="Refresh">
                                    <i class="fa-solid fa-rotate-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box">
                            <table class="table align-middle mb-0 table-hover datatable-init menu-category-table">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">#</th>
                                        <th>Name</th>
                                        <th>Display Name</th>
                                        <th style="width: 110px;">Position</th>
                                        <th style="width: 190px;">Menu Visibility</th>
                                        <th style="width: 140px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><span class="sn-badge">1</span></td>
                                        <td class="fw-medium text-dark">beverage</td>
                                        <td class="fw-medium text-dark">Beverages</td>
                                        <td>1</td>
                                        <td><span class="badge menu-visibility-badge is-visible">Visible</span></td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-success shadow-sm action-btn view-row" title="View"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="btn btn-sm btn-outline-primary shadow-sm action-btn edit-row" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm action-btn delete-row" title="Delete"><i
                                                        class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td><span class="sn-badge">2</span></td>
                                        <td class="fw-medium text-dark">main-course</td>
                                        <td class="fw-medium text-dark">Main Course</td>
                                        <td>2</td>
                                        <td><span class="badge menu-visibility-badge is-visible">Visible</span></td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-success shadow-sm action-btn view-row" title="View"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="btn btn-sm btn-outline-primary shadow-sm action-btn edit-row" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm action-btn delete-row" title="Delete"><i
                                                        class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td><span class="sn-badge">3</span></td>
                                        <td class="fw-medium text-dark">dessert</td>
                                        <td class="fw-medium text-dark">Dessert</td>
                                        <td>3</td>
                                        <td><span class="badge menu-visibility-badge is-hidden">Hidden</span></td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-sm btn-outline-success shadow-sm action-btn view-row" title="View"><i
                                                        class="fa-solid fa-eye"></i></button>
                                                <button class="btn btn-sm btn-outline-primary shadow-sm action-btn edit-row" title="Edit"><i
                                                        class="fa-solid fa-pen-to-square"></i></button>
                                                <button class="btn btn-sm btn-outline-danger shadow-sm action-btn delete-row" title="Delete"><i
                                                        class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <template id="menuCategorySnTemplate">
                            <span class="sn-badge">0</span>
                        </template>

                        <template id="menuCategoryNameTemplate">
                            <span class="fw-medium text-dark"></span>
                        </template>

                        <template id="menuCategoryDisplayNameTemplate">
                            <span class="fw-medium text-dark"></span>
                        </template>

                        <template id="menuCategoryPositionTemplate">
                            <span class="text-dark fw-semibold"></span>
                        </template>

                        <template id="menuCategoryVisibilityTemplate">
                            <span class="badge menu-visibility-badge"></span>
                        </template>

                        <template id="menuCategoryActionsTemplate">
                            <div class="d-flex justify-content-center gap-2">
                                <button class="btn btn-sm btn-outline-success shadow-sm action-btn view-row" title="View"><i class="fa-solid fa-eye"></i></button>
                                <button class="btn btn-sm btn-outline-primary shadow-sm action-btn edit-row" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn btn-sm btn-outline-danger shadow-sm action-btn delete-row" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/menu-category.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
