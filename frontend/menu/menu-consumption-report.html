<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredient Consumption Report - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/menu-consumption-report.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="menu-consumption-report-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Ingredient Consumption Report</h4>
                        <p class="page-header-subtitle">Monitor stock items consumed by each menu item with conversion multiplier details.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card consumption-filter-card">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-12 col-md-6 col-lg-2">
                                <label class="form-label" for="consumptionStockCategory">Stock Category</label>
                                <select id="consumptionStockCategory" class="form-select filter-dropdown">
                                    <option value="">-- Select --</option>
                                </select>
                            </div>

                            <div class="col-12 col-md-6 col-lg-2">
                                <label class="form-label" for="consumptionMenuItem">Menu Item</label>
                                <select id="consumptionMenuItem" class="form-select filter-dropdown">
                                    <option value="">-- Select --</option>
                                </select>
                            </div>

                            <div class="col-12 col-md-6 col-lg-2">
                                <label class="form-label" for="consumptionFromDate">From Date</label>
                                <input id="consumptionFromDate" class="form-control filter-search-input" type="text" placeholder="YYYY-MM-DD">
                            </div>

                            <div class="col-12 col-md-6 col-lg-2">
                                <label class="form-label" for="consumptionToDate">To Date</label>
                                <input id="consumptionToDate" class="form-control filter-search-input" type="text" placeholder="YYYY-MM-DD">
                            </div>

                            <div class="col-12 col-lg-4">
                                <label class="form-label">Actions</label>
                                <div class="consumption-actions">
                                    <select id="consumptionPageLength" class="form-select filter-dropdown consumption-length-select">
                                        <option value="10">10</option>
                                        <option value="25">25</option>
                                        <option value="50" selected>50</option>
                                        <option value="100">100</option>
                                    </select>

                                    <button type="button" id="consumptionRefreshBtn" class="btn consumption-icon-btn consumption-refresh" title="Refresh">
                                        <i class="fa-solid fa-rotate-right"></i>
                                    </button>

                                    <button type="button" id="consumptionPrintBtn" class="btn consumption-icon-btn consumption-print" title="Print">
                                        <i class="fa-solid fa-print"></i>
                                    </button>

                                    <button type="button" id="consumptionPdfBtn" class="btn consumption-icon-btn consumption-pdf" title="Export PDF">
                                        <i class="fa-regular fa-file-pdf"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box consumption-table-box">
                            <table class="table align-middle mb-0 table-hover consumption-table datatable-init">
                                <thead>
                                    <tr>
                                        <th style="width: 70px;">#</th>
                                        <th>Stock Item</th>
                                        <th>Menu Item</th>
                                        <th>Consumed Qty</th>
                                        <th>Multiplier</th>
                                    </tr>
                                </thead>
                                <tbody id="consumptionReportBody"></tbody>
                            </table>
                        </div>

                        <template id="consumptionSnTemplate">
                            <span class="sn-badge">0</span>
                        </template>

                        <template id="consumptionStockTemplate">
                            <span class="stock-name"></span>
                        </template>

                        <template id="consumptionMenuTemplate">
                            <span class="menu-name"></span>
                        </template>

                        <template id="consumptionQtyTemplate">
                            <span class="qty-badge"></span>
                        </template>

                        <template id="consumptionMultiplierTemplate">
                            <span class="multiplier-badge"></span>
                        </template>

                        <template id="consumptionReportPageTemplate">
                            <html>
                            <head>
                                <title data-report-title></title>
                                <style>
                                    body { font-family: Arial, sans-serif; margin: 22px; color: #1f2937; }
                                    h2 { margin: 0 0 8px 0; color: #0f172a; }
                                    p { margin: 3px 0; color: #334155; font-size: 13px; }
                                    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
                                    th, td { border: 1px solid #d1d5db; padding: 8px 10px; font-size: 12px; }
                                    th { background: #f1f5f9; text-align: left; }
                                    tr:nth-child(even) { background: #f8fafc; }
                                </style>
                            </head>
                            <body>
                                <h2 data-report-heading></h2>
                                <p><strong>Stock Category:</strong> <span data-report-category></span></p>
                                <p><strong>Menu Item:</strong> <span data-report-menu-item></span></p>
                                <p><strong>From Date:</strong> <span data-report-from-date></span></p>
                                <p><strong>To Date:</strong> <span data-report-to-date></span></p>
                                <p><strong>Generated On:</strong> <span data-report-generated-on></span></p>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Stock Item</th>
                                            <th>Menu Item</th>
                                            <th>Consumed Qty</th>
                                            <th>Multiplier</th>
                                        </tr>
                                    </thead>
                                    <tbody data-report-body></tbody>
                                </table>
                            </body>
                            </html>
                        </template>

                        <template id="consumptionReportRowTemplate">
                            <tr>
                                <td data-col-sn></td>
                                <td data-col-stock-item></td>
                                <td data-col-menu-item></td>
                                <td data-col-consumed-qty></td>
                                <td data-col-multiplier></td>
                            </tr>
                        </template>

                        <template id="consumptionReportEmptyRowTemplate">
                            <tr>
                                <td colspan="5" style="text-align:center;padding:14px;">No records found.</td>
                            </tr>
                        </template>

                        <div class="consumption-footnote" id="consumptionFootnote"></div>
                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/menu-consumption-report.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
