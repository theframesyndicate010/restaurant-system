<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Add Menu Items - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="styles/bulk-add-menu-items.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="bulk-add-menu-items-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Bulk Add Menu Items</h4>
                        <p class="page-header-subtitle">Create multiple menu entries quickly and save them in one action.</p>
                    </div>
                </div>

                <div class="card content-card bulk-menu-card">
                    <div class="card-body p-3 p-md-4">
                        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-stretch align-items-lg-center gap-3 bulk-menu-topbar">
                            <div class="bulk-menu-filter-wrap">
                                <select id="bulkMenuCategory" class="form-select filter-dropdown bulk-menu-category" aria-label="Select category">
                                    <option value="">-- Select Category --</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2 flex-wrap justify-content-start justify-content-lg-end bulk-menu-actions">
                                <button type="button" id="bulkMenuAddRowBtn" class="btn bulk-menu-add-row-btn">
                                    <i class="fa-solid fa-plus"></i> Add Row
                                </button>
                                <button type="button" id="bulkMenuSaveBtn" class="btn bulk-menu-save-btn">
                                    <i class="fa-regular fa-floppy-disk"></i> Save All Menu
                                </button>
                            </div>
                        </div>

                        <div id="bulkMenuMessage" class="alert d-none mt-3 mb-0" role="alert"></div>

                        <p class="bulk-menu-note mb-3 mt-4">Fill in the details below. Press <kbd>Enter</kbd> on the last column to create a new row.</p>

                        <div class="table-responsive premium-table-box bulk-menu-table-wrap">
                            <table class="table align-middle mb-0 bulk-menu-table">
                                <thead>
                                    <tr>
                                        <th style="width: 60px;">#</th>
                                        <th style="min-width: 180px;">Name <span class="text-danger">*</span></th>
                                        <th style="min-width: 170px;">Display Name</th>
                                        <th style="min-width: 130px;">Code</th>
                                        <th style="min-width: 110px;" class="text-end">Rate <span class="text-danger">*</span></th>
                                        <th style="min-width: 140px;">Unit <span class="text-danger">*</span></th>
                                        <th style="min-width: 130px;">Short Name</th>
                                        <th style="width: 70px;"></th>
                                    </tr>
                                </thead>
                                <tbody id="bulkMenuItemsBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <template id="bulkMenuRowTemplate">
        <tr>
            <td class="row-sn"><span class="sn-badge">1</span></td>
            <td><input type="text" class="bulk-menu-input" name="name" placeholder="Menu item name"></td>
            <td><input type="text" class="bulk-menu-input" name="display_name" placeholder="Display name"></td>
            <td><input type="text" class="bulk-menu-input" name="code" placeholder="Code"></td>
            <td><input type="number" class="bulk-menu-input text-end" name="rate" min="0" step="0.01" placeholder="0.00"></td>
            <td>
                <select class="bulk-menu-input" name="unit">
                    <option value="">Select Unit</option>
                    <option value="Plate">Plate</option>
                    <option value="Piece">Piece</option>
                    <option value="Cup">Cup</option>
                    <option value="Glass">Glass</option>
                    <option value="Bowl">Bowl</option>
                    <option value="Pack">Pack</option>
                </select>
            </td>
            <td><input type="text" class="bulk-menu-input last-col" name="short_name" placeholder="Short name"></td>
            <td>
                <button type="button" class="btn btn-link text-danger p-0 bulk-row-delete-btn" title="Remove row">
                    <i class="fa-solid fa-circle-xmark fs-5"></i>
                </button>
            </td>
        </tr>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/scripts/script.js"></script>
    <script src="scripts/bulk-add-menu-items.js"></script>
</body>

</html>
