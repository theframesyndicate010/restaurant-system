<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Menu Unit - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="../shared/styles/base/floaty.css">
    <link rel="stylesheet" href="styles/create-menu-unit.css">
</head>

<body>
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="row">
                    <div class="col-12">
                        <div class="card content-card create-menu-unit-card">
                            <div class="card-body p-4 p-md-5">
                                <div class="d-flex align-items-center mb-4 border-bottom pb-4 create-menu-unit-header">
                                    <div class="d-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded text-primary me-3 create-menu-unit-icon">
                                        <i class="fa-solid fa-ruler fs-5"></i>
                                    </div>
                                    <div>
                                        <h5 class="fw-bold text-dark mb-1 create-menu-unit-title">Create Menu Unit</h5>
                                        <p class="text-muted small mb-0">Add a new unit that can be used in menu setup and reports.</p>
                                    </div>
                                </div>

                                <form id="createMenuUnitForm">
                                    <div id="createMenuUnitMessage" class="alert d-none mb-4" role="alert"></div>

                                    <div class="row g-4 pt-2">
                                        <div class="col-12">
                                            <div class="floaty-input">
                                                <input type="text" id="menuUnitName" class="form-control form-control-solid" placeholder=" " required>
                                                <label class="text-dark">
                                                    <i class="fa-solid fa-tag me-1 text-primary"></i> Name <span class="text-danger">*</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="alert mt-4 mb-0 create-menu-unit-note">
                                        <i class="fa-solid fa-circle-info me-2"></i>
                                        <strong class="fw-bold">Note</strong> * Fields are mandatory
                                    </div>

                                    <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top create-menu-unit-actions">
                                        <a href="menu-unit.html"
                                            class="btn px-4 bg-white text-dark border d-flex align-items-center gap-2 text-decoration-none create-menu-unit-btn-muted">
                                            <i class="fa-solid fa-arrow-left"></i> Back
                                        </a>
                                        <button type="reset"
                                            class="btn px-4 bg-white text-dark border d-flex align-items-center gap-2 create-menu-unit-btn-muted">
                                            <i class="fa-solid fa-rotate-right"></i> Reset
                                        </button>
                                        <button type="submit" class="btn px-4 d-flex align-items-center gap-2 text-white create-menu-unit-btn-primary">
                                            <i class="fa-solid fa-paper-plane"></i> Save Unit
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/scripts/script.js"></script>
    <script src="scripts/create-menu-unit.js"></script>
</body>

</html>
