<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Ingredient - Smart Cafeteria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/menu-ingredient.css">
    <link rel="icon" type="image/png" href="../favicon.png" />
</head>

<body class="menu-ingredient-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Menu Ingredient</h4>
                        <p class="page-header-subtitle">Assign and maintain ingredient setup for each menu item.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card menu-ingredient-toolbar-card">
                    <div class="card-body">
                        <div class="d-flex flex-column flex-xl-row gap-3 align-items-stretch align-items-xl-center">
                            <button type="button" id="menuIngredientSetupBtn" class="btn menu-ingredient-setup-btn">
                                <i class="fa-solid fa-gear"></i> Setup Menu Ingredient
                            </button>

                            <div class="d-flex flex-wrap align-items-center gap-2 ms-xl-auto menu-ingredient-controls">
                                <select id="menuIngredientCategory" class="form-select filter-dropdown menu-ingredient-category">
                                    <option value="">--Select Category--</option>
                                </select>

                                <input type="search" id="menuIngredientSearch" class="form-control filter-search-input menu-ingredient-search"
                                    placeholder="Menu Item">

                                <select id="menuIngredientPageLength" class="form-select filter-dropdown menu-ingredient-length">
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50" selected>50</option>
                                    <option value="100">100</option>
                                </select>

                                <button type="button" id="menuIngredientRefresh" class="btn menu-ingredient-refresh-btn" title="Refresh">
                                    <i class="fa-solid fa-rotate-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box">
                            <table class="table align-middle mb-0 table-hover datatable-init menu-ingredient-table">
                                <thead>
                                    <tr>
                                        <th style="width: 80px;">#</th>
                                        <th>Display Name</th>
                                        <th style="width: 180px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><span class="sn-badge">1</span></td>
                                        <td>
                                            <div class="d-flex flex-column">
                                                <span class="fw-medium text-dark">Chicken Momo</span>
                                                <small class="text-muted ingredient-category">Kitchen</small>
                                            </div>
                                        </td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-success shadow-sm action-btn setup-row" type="button" data-item-name="Chicken Momo">
                                                <i class="fa-solid fa-gear me-1"></i> Setup
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <template id="menuIngredientSnTemplate">
                            <span class="sn-badge">0</span>
                        </template>

                        <template id="menuIngredientDisplayTemplate">
                            <div class="d-flex flex-column">
                                <span class="fw-medium text-dark"></span>
                                <small class="text-muted ingredient-category"></small>
                            </div>
                        </template>

                        <template id="menuIngredientSetupActionTemplate">
                            <button class="btn btn-sm shadow-sm action-btn setup-row" type="button">
                                <i class="fa-solid fa-gear me-1"></i>
                                <span class="setup-label"></span>
                            </button>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/menu-ingredient.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
