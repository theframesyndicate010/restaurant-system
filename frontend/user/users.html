<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Smart Cafeteria</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/styles/layout/sidebar.css">
    <link rel="stylesheet" href="../shared/styles/layout/header.css">
    <link rel="stylesheet" href="../shared/styles/base/style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../table/styles/datatable.css">
    <link rel="stylesheet" href="styles/users.css">
</head>

<body class="users-page">
    <div class="d-flex wrapper vh-100 overflow-hidden">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <app-sidebar></app-sidebar>

        <div class="main-content flex-grow-1 bg-light-gray d-flex flex-column h-100 overflow-hidden">
            <app-header></app-header>

            <div class="container-fluid p-3 p-md-4 overflow-auto">
                <div class="card page-header-card">
                    <div class="card-body d-flex flex-column gap-1">
                        <h4 class="page-header-title">Users</h4>
                        <p class="page-header-subtitle">Manage user accounts, assigned roles, and status controls.</p>
                    </div>
                </div>

                <div class="card filter-toolbar-card users-filter-card">
                    <div class="card-body">
                        <div class="users-toolbar-row">
                            <button type="button" id="addUserBtn" class="btn users-add-btn">
                                <i class="fa-solid fa-plus"></i>
                                <span>Add New User</span>
                            </button>

                            <select id="userStatusFilter" class="form-select filter-dropdown users-status-filter" aria-label="Filter users by status">
                                <option value="enabled" selected>Active</option>
                                <option value="disabled">Inactive</option>
                                <option value="">All</option>
                            </select>

                            <input
                                id="userSearch"
                                type="search"
                                class="form-control filter-search-input users-search"
                                placeholder="User Name"
                                aria-label="Search user"
                            >

                            <select id="userPageLength" class="form-select filter-dropdown users-page-length" aria-label="Page length">
                                <option value="10" selected>10</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>

                            <button type="button" id="userRefreshBtn" class="btn users-refresh-btn" title="Refresh">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card content-card">
                    <div class="card-body">
                        <div class="table-responsive premium-table-box users-table-shell">
                            <table class="table align-middle mb-0 table-hover users-table datatable-init" id="usersTable">
                                <thead>
                                    <tr>
                                        <th>Full Name</th>
                                        <th>Address 1</th>
                                        <th>Address 2</th>
                                        <th>Contact</th>
                                        <th>Email</th>
                                        <th>Created Date</th>
                                        <th>Username</th>
                                        <th>Roles</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody"></tbody>
                            </table>
                        </div>

                        <template id="userCellNameTemplate">
                            <span class="user-full-name"></span>
                        </template>

                        <template id="userCellAddress1Template">
                            <span class="user-address1"></span>
                        </template>

                        <template id="userCellAddress2Template">
                            <span class="user-address2"></span>
                        </template>

                        <template id="userCellContactTemplate">
                            <span class="user-contact"></span>
                        </template>

                        <template id="userCellEmailTemplate">
                            <span class="user-email"></span>
                        </template>

                        <template id="userCellDateTemplate">
                            <span class="user-created-date"></span>
                        </template>

                        <template id="userCellUsernameTemplate">
                            <span class="user-username"></span>
                        </template>

                        <template id="userCellRoleTemplate">
                            <span class="user-role"></span>
                        </template>

                        <template id="userCellStatusTemplate">
                            <span class="user-status-badge">Enabled</span>
                        </template>

                        <template id="userCellActionsTemplate">
                            <div class="d-flex justify-content-center user-action-wrap">
                                <button type="button" class="action-btn user-toggle-btn" title="Toggle Status">
                                    <i class="fa-regular fa-thumbs-down"></i>
                                </button>
                                <button type="button" class="action-btn action-btn-edit user-edit-btn" title="Edit">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button type="button" class="action-btn user-password-btn" title="Reset Password">
                                    <i class="fa-solid fa-key"></i>
                                </button>
                                <button type="button" class="action-btn action-btn-delete user-delete-btn" title="Delete">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </template>

                        <app-datatable></app-datatable>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/components/component.js"></script>
    <script src="../shared/components/data_table.js"></script>
    <script src="scripts/users.js"></script>
    <script src="../shared/scripts/script.js"></script>
</body>

</html>
